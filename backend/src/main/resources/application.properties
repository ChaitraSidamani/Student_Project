# Application
spring.application.name=student-management-system
server.port=8082

# ==========================================
# DATABASE CONFIGURATION
# ==========================================
# For production (MySQL), uncomment and configure:
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/sms_db?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Data initialization
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=true

# ==========================================
# JWT CONFIGURATION
# ==========================================
app.jwt.secret=${JWT_SECRET:SMS_SECRET_KEY_COLLEGE_MANAGEMENT_SYSTEM_2024_SUPER_SECURE_256_BITS}
app.jwt.expiration=${JWT_EXPIRATION:86400000}

# ==========================================
# CORS
# ==========================================
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

# ==========================================
# LOGGING
# ==========================================
logging.level.com.sms=INFO
logging.level.org.springframework.security=WARN

# ==========================================
# ACTUATOR / MONITORING
# ==========================================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when_authorized